<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>STEPFALL — Faithful · Minigames</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      /* macroquad resizes the canvas to fill; keep every logical pixel square. */
      #glcanvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* An unobtrusive way back to the Collection, hidden once a key is pressed
         so it never sits over play. */
      #back {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 10;
        font: 13px/1 ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        color: #9a9a9a;
        text-decoration: none;
        opacity: 0.7;
      }
      #back:hover {
        color: #fff;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <a id="back" href="../">&larr; Collection</a>
    <canvas id="glcanvas" tabindex="1"></canvas>
    <script src="../vendor/mq_js_bundle.js"></script>
    <script>
      // Hide the back-link the moment the player starts interacting.
      const back = document.getElementById("back");
      addEventListener("keydown", () => (back.style.display = "none"), { once: true });
      document.getElementById("glcanvas").focus();
      load("./stepfall.wasm");
    </script>
  </body>
</html>
